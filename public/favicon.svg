<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 11 11" shape-rendering="crispEdges">
  <!-- Purple outline blocks -->
  <rect x="0" y="0" width="1" height="3" fill="#6C3BAA" />
  <rect x="10" y="0" width="1" height="3" fill="#6C3BAA" />
  
  <rect x="1" y="3" width="1" height="3" fill="#6C3BAA" />
  <rect x="9" y="3" width="1" height="3" fill="#6C3BAA" />
  
  <rect x="2" y="6" width="1" height="2" fill="#6C3BAA" />
  <rect x="8" y="6" width="1" height="2" fill="#6C3BAA" />
  
  <rect x="3" y="8" width="1" height="1" fill="#6C3BAA" />
  <rect x="7" y="8" width="1" height="1" fill="#6C3BAA" />
  
  <rect x="4" y="9" width="3" height="1" fill="#6C3BAA" />

  <!-- Inner outline for top -->
  <rect x="2" y="0" width="1" height="2" fill="#6C3BAA" />
  <rect x="8" y="0" width="1" height="2" fill="#6C3BAA" />
  
  <rect x="3" y="2" width="1" height="2" fill="#6C3BAA" />
  <rect x="7" y="2" width="1" height="2" fill="#6C3BAA" />
  
  <rect x="4" y="4" width="3" height="1" fill="#6C3BAA" />
  
  <!-- White fill blocks -->
  <rect x="1" y="0" width="1" height="3" fill="#FFFFFF" />
  <rect x="9" y="0" width="1" height="3" fill="#FFFFFF" />
  
  <rect x="2" y="2" width="1" height="4" fill="#FFFFFF" />
  <rect x="8" y="2" width="1" height="4" fill="#FFFFFF" />
  
  <rect x="3" y="4" width="1" height="4" fill="#FFFFFF" />
  <rect x="7" y="4" width="1" height="4" fill="#FFFFFF" />
  
  <rect x="4" y="5" width="3" height="4" fill="#FFFFFF" />
</svg>
